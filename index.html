<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuiz Huruf Arab | Log Masuk</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="arab">ب ت ث</div>
      <h1>Kuiz Huruf Arab</h1>
      <p>Belajar huruf dengan seronok!</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="tunjukTab('masuk')">Log Masuk</button>
      <button class="auth-tab" onclick="tunjukTab('daftar')">Daftar</button>
    </div>

    <!-- FORM LOG MASUK -->
    <div id="tab-masuk">
      <div class="form-group">
        <label>E-mel</label>
        <input type="email" id="masuk-email" placeholder="contoh@email.com" />
      </div>
      <div class="form-group">
        <label>Kata laluan</label>
        <input type="password" id="masuk-kl" placeholder="••••••••" />
      </div>
      <button class="btn-utama" id="btn-masuk" onclick="buatLogMasuk()">Log Masuk</button>
      <div class="msg-error" id="masuk-ralat"></div>
    </div>

    <!-- FORM DAFTAR -->
    <div id="tab-daftar" style="display:none;">
      <div class="form-group">
        <label>Nama penuh</label>
        <input type="text" id="daftar-nama" placeholder="Nama anda" />
      </div>
      <div class="form-group">
        <label>Peranan</label>
        <select id="daftar-peranan" onchange="semakPeranan()">
          <option value="murid">Murid</option>
          <option value="guru">Guru</option>
        </select>
      </div>
      <div class="form-group" id="kumpulan-kelas">
        <label>Kelas</label>
        <input type="text" id="daftar-kelas" placeholder="cth: 2 Amanah" />
      </div>
      <div class="form-group">
        <label>E-mel</label>
        <input type="email" id="daftar-email" placeholder="contoh@email.com" />
      </div>
      <div class="form-group">
        <label>Kata laluan (sekurang-kurangnya 6 aksara)</label>
        <input type="password" id="daftar-kl" placeholder="••••••••" />
      </div>
      <button class="btn-utama" id="btn-daftar" onclick="buatDaftar()">Daftar Akaun</button>
      <div class="msg-error" id="daftar-ralat"></div>
      <div class="msg-ok" id="daftar-ok"></div>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
<script>
// ── Tangani callback dari e-mel pengesahan Supabase ──
(async () => {
  // Supabase letak token dalam URL hash selepas klik e-mel
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (accessToken) {
      const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      if (!error) {
        // Bersihkan URL
        window.history.replaceState({}, document.title, '/');
      }
    }
  }

  // Semak sama ada sudah log masuk
  const sesi = await semakSesi();
  if (sesi) {
    const p = await ambilProfil(sesi.user.id);
    if (p) {
      window.location.href = p.peranan === 'guru' ? '/guru.html' : '/murid.html';
      return;
    }
  }
})();

function tunjukTab(tab) {
  document.getElementById('tab-masuk').style.display = tab === 'masuk' ? 'block' : 'none';
  document.getElementById('tab-daftar').style.display = tab === 'daftar' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'masuk') || (i === 1 && tab === 'daftar'));
  });
}

function semakPeranan() {
  const p = document.getElementById('daftar-peranan').value;
  document.getElementById('kumpulan-kelas').style.display = p === 'murid' ? 'block' : 'none';
}

async function buatLogMasuk() {
  const email = document.getElementById('masuk-email').value.trim();
  const kl = document.getElementById('masuk-kl').value;
  const ralat = document.getElementById('masuk-ralat');
  const btn = document.getElementById('btn-masuk');
  ralat.style.display = 'none';

  if (!email || !kl) { tunjukRalat(ralat, 'Sila isi e-mel dan kata laluan.'); return; }

  btn.disabled = true;
  btn.textContent = 'Sedang log masuk...';

  try {
    const data = await logMasuk(email, kl);
    const p = await ambilProfil(data.user.id);
    window.location.href = p && p.peranan === 'guru' ? '/guru.html' : '/murid.html';
  } catch (e) {
    let msg = 'E-mel atau kata laluan salah.';
    if (e.message && e.message.includes('Email not confirmed')) {
      msg = 'E-mel belum disahkan. Sila semak inbox anda dan klik pautan pengesahan.';
    }
    tunjukRalat(ralat, msg);
    btn.disabled = false;
    btn.textContent = 'Log Masuk';
  }
}

async function buatDaftar() {
  const nama = document.getElementById('daftar-nama').value.trim();
  const peranan = document.getElementById('daftar-peranan').value;
  const kelas = document.getElementById('daftar-kelas').value.trim();
  const email = document.getElementById('daftar-email').value.trim();
  const kl = document.getElementById('daftar-kl').value;
  const ralat = document.getElementById('daftar-ralat');
  const ok = document.getElementById('daftar-ok');
  const btn = document.getElementById('btn-daftar');
  ralat.style.display = 'none';
  ok.style.display = 'none';

  if (!nama || !email || !kl) { tunjukRalat(ralat, 'Sila isi semua maklumat.'); return; }
  if (kl.length < 6) { tunjukRalat(ralat, 'Kata laluan sekurang-kurangnya 6 aksara.'); return; }

  btn.disabled = true;
  btn.textContent = 'Sedang mendaftar...';

  try {
    const data = await daftarPengguna(email, kl, nama, peranan, kelas);

    // Jika pengesahan e-mel dimatikan, terus log masuk
    if (data.session) {
      window.location.href = peranan === 'guru' ? '/guru.html' : '/murid.html';
      return;
    }

    // Jika pengesahan e-mel dihidupkan
    ok.textContent = '✓ Akaun berjaya didaftar! Sila semak e-mel anda dan klik pautan pengesahan untuk log masuk.';
    ok.style.display = 'block';
    btn.textContent = 'Daftar Akaun';
    btn.disabled = false;
  } catch (e) {
    let msg = e.message || 'Ralat semasa mendaftar.';
    if (msg.includes('already registered')) msg = 'E-mel ini sudah didaftarkan. Sila log masuk.';
    tunjukRalat(ralat, msg);
    btn.disabled = false;
    btn.textContent = 'Daftar Akaun';
  }
}

function tunjukRalat(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
